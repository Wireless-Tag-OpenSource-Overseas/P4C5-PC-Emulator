## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=4.1.0'
  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
  espressif/esp_lcd_axs15231b:
    matches:
    - if: idf_version < 6.0
      version: ==1.0.0
    - if: idf_version >= 6.0
      version: ==2.1.0
  espressif/esp_lcd_st7701:
    version: ==2.0.2
    rules:
    - if: idf_version >= 5.5
  espressif/esp_lcd_ek79007:
    version: '==2.0.2'
  espressif/esp_lcd_touch_gt911: ^1
  # espressif/esp_wifi_remote:  # Disabled: IDF v5.5 Kconfig incompat
  #   version: '*'
  #   rules:
  #   - if: "target in [esp32p4]"
  # espressif/esp_hosted:  # Disabled: depends on wifi_remote
  #   version: '*'
  #   rules:
  #   - if: "target in [esp32p4]"
  espressif/esp_codec_dev:
    version: ^1.3.4
    rules:
    - if: "target in [esp32p4]"
  espressif/usb_host_hid:
    version: '==1.2.0'
